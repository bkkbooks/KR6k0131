front:
  text: 四分律比丘含注戒本序太一山沙門釋道宣述四分戒本者蓋開萬行之通衢引三乘之正軌也自法王利見弘濟在緣程上聖之悽惶悼小凡之沈溺故能闢不諱之門示祕密之深術張無問之說顯初學之津塗遂靜處而興教源集眾而宣玄範前明由序廣陳發致之功後列大宗盛羅機欲所被約時敷演通行於是承遵合潔等聞正法由茲久住但以時來不競情變所流經陣夢㲲之徵律舒分杖之喻致使教隨文結理任情移雲飛二部五部之殊山張十八五百之異取其元始所被無非計情窮其要會之心俱通正業逮乎曹魏之末戒本創傳終於隋運之初芟改者眾或依梵本或寫隷文或以義求或以緣據讎校諸說成務蒙然濫罔前修翳昏後學梵本則文旨乖互方言未融準律則得在宗歸失於辨相義求雖有深會未靜論端緣據似是具周止存別見原夫正戒明禁唯佛制開賢聖緘默但知祇奉故律論所述咸宗本經自餘位班曾未揣度總敘諸見師心者多考定昔緣良所未暇今以戒本繁略隱義局文用則失儀捨則非據若不顯相人難具依余少仰玄風志隆清範昔在帝京周流講肆伏膺請業載紀相尋何甞不執卷臨文慨斯壅結遂以貞觀四年庚寅之歲薄遊嶽瀆廣評律宗但見誦語紛綸未思弘遠高譚有務事用無施纔羅七五之名妄居一字之首但述行藏之要寧開決正之心問以戒律廢興妙憑疏解約之情通本據無文可依自有博學生知行名雙顯而神用莫準情取天乖余意之所未安義當依法為定則諍輪自弭何俟繁辭今試敢依律本具錄正經仍從佛解即為注述文唯一卷同昔所傳持犯兩明今便異古庶令初後兼學愚智齊遵麁知則具三種持律精練則是一師大化以斯用求成濟為極又以戒各緣起妄說非無若不鏡曉終歸虛託故隨戒類引刪要補之俾夫顯相通班輕重昭現足以潤身光德足以護法匡時臨文無取謬於文思義則不資他義豈直自貽無漏亦將兼濟有緣故輒筆記序之云爾
